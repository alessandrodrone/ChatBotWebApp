<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ shop.name }} – Prenota su WhatsApp | RispondiTu</title>
    <meta name="description" content="{{ shop.description }}">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💈</text></svg>">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ── Reset & Base ───────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: {{ shop.color | default('#1a1a2e') }};
            --accent: {{ shop.accent | default('#e94560') }};
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.10);
            --text: #f0f0f0;
            --text-muted: #a0a0b0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        /* ── Background decoration ──────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.03) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, var(--accent), transparent 50%);
            opacity: 0.15;
            z-index: 0;
            animation: bgMove 20s ease-in-out infinite alternate;
        }

        @keyframes bgMove {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(-5%, -3%); }
        }

        /* ── Card ───────────────────────────────────────────── */
        .landing-card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 36px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            animation: fadeUp 0.6s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Emoji icon ─────────────────────────────────────── */
        .shop-icon {
            font-size: 56px;
            margin-bottom: 16px;
            display: block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.08); }
        }

        /* ── Typography ─────────────────────────────────────── */
        .shop-name {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .shop-address {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .shop-description {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* ── Divider ────────────────────────────────────────── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--card-border), transparent);
            margin: 0 auto 28px;
            width: 60%;
        }

        /* ── CTA Button ─────────────────────────────────────── */
        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #25D366;
            color: #fff;
            font-family: inherit;
            font-size: 17px;
            font-weight: 700;
            padding: 16px 36px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.35);
            position: relative;
            overflow: hidden;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s ease;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(37, 211, 102, 0.5);
        }

        .cta-btn:hover::before { left: 100%; }

        .cta-btn:active { transform: translateY(0); }

        .wa-icon {
            width: 24px;
            height: 24px;
            fill: #fff;
            flex-shrink: 0;
        }

        /* ── Footer ─────────────────────────────────────────── */
        .footer {
            position: relative;
            z-index: 1;
            margin-top: 32px;
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .footer a:hover { text-decoration: underline; }

        /* ── Features ───────────────────────────────────────── */
        .features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .feature {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .feature-icon {
            font-size: 22px;
        }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 480px) {
            .landing-card { padding: 36px 24px; }
            .shop-name { font-size: 24px; }
            .cta-btn { padding: 14px 28px; font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="landing-card">
        <span class="shop-icon">💈</span>

        <h1 class="shop-name">{{ shop.name }}</h1>

        {% if shop.address %}
        <p class="shop-address">
            <span>📍</span> {{ shop.address }}
        </p>
        {% endif %}

        <p class="shop-description">
            {{ shop.description | default("Prenota il tuo appuntamento in modo semplice e veloce.") }}
        </p>

        <div class="divider"></div>

        <div class="features">
            <div class="feature">
                <span class="feature-icon">⚡</span>
                <span>Veloce</span>
            </div>
            <div class="feature">
                <span class="feature-icon">📅</span>
                <span>24/7</span>
            </div>
            <div class="feature">
                <span class="feature-icon">✅</span>
                <span>Conferma immediata</span>
            </div>
        </div>

        <a href="{{ wa_link }}" class="cta-btn" target="_blank" rel="noopener">
            <svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                <path d="M12 0C5.373 0 0 5.373 0 12c0 2.085.534 4.048 1.47 5.756L.058 23.536a.5.5 0 00.608.608l5.78-1.412A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.85 0-3.59-.5-5.08-1.372l-.354-.21-3.673.897.913-3.673-.23-.365A9.935 9.935 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
            </svg>
            Prenota su WhatsApp
        </a>
    </div>

    <footer class="footer">
        Powered by <a href="https://risponditu.com" target="_blank">RispondiTu</a>
    </footer>

</body>
</html>
